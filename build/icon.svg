<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Subtle outer glow -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="none" stroke="#7c3aed" stroke-width="2" opacity="0.25"/>

  <!-- ==================== PIXELATED PEN (left-center) ==================== -->
  <!-- Pen tilted ~45 degrees, built from pixel blocks. Each block = 28x28 -->
  <g transform="translate(145, 200) rotate(-45, 280, 280)">
    <!-- Pen tip (triangle, 3 pixels) -->
    <rect x="252" y="504" width="28" height="28" fill="#c4b5fd"/>
    <rect x="252" y="532" width="28" height="28" fill="#a78bfa"/>
    <rect x="280" y="532" width="28" height="28" fill="#a78bfa"/>

    <!-- Pen nib (metal part) -->
    <rect x="224" y="476" width="28" height="28" fill="#d4d4d8"/>
    <rect x="252" y="476" width="28" height="28" fill="#e4e4e7"/>
    <rect x="280" y="476" width="28" height="28" fill="#d4d4d8"/>
    <rect x="308" y="476" width="28" height="28" fill="#a1a1aa"/>

    <rect x="224" y="448" width="28" height="28" fill="#a1a1aa"/>
    <rect x="252" y="448" width="28" height="28" fill="#d4d4d8"/>
    <rect x="280" y="448" width="28" height="28" fill="#e4e4e7"/>
    <rect x="308" y="448" width="28" height="28" fill="#d4d4d8"/>

    <!-- Pen body (main shaft - purple gradient pixels) -->
    <rect x="224" y="420" width="28" height="28" fill="#7c3aed"/>
    <rect x="252" y="420" width="28" height="28" fill="#8b5cf6"/>
    <rect x="280" y="420" width="28" height="28" fill="#8b5cf6"/>
    <rect x="308" y="420" width="28" height="28" fill="#7c3aed"/>

    <rect x="224" y="392" width="28" height="28" fill="#7c3aed"/>
    <rect x="252" y="392" width="28" height="28" fill="#a78bfa"/>
    <rect x="280" y="392" width="28" height="28" fill="#a78bfa"/>
    <rect x="308" y="392" width="28" height="28" fill="#7c3aed"/>

    <rect x="224" y="364" width="28" height="28" fill="#6d28d9"/>
    <rect x="252" y="364" width="28" height="28" fill="#8b5cf6"/>
    <rect x="280" y="364" width="28" height="28" fill="#8b5cf6"/>
    <rect x="308" y="364" width="28" height="28" fill="#6d28d9"/>

    <rect x="224" y="336" width="28" height="28" fill="#6d28d9"/>
    <rect x="252" y="336" width="28" height="28" fill="#7c3aed"/>
    <rect x="280" y="336" width="28" height="28" fill="#7c3aed"/>
    <rect x="308" y="336" width="28" height="28" fill="#6d28d9"/>

    <rect x="224" y="308" width="28" height="28" fill="#5b21b6"/>
    <rect x="252" y="308" width="28" height="28" fill="#7c3aed"/>
    <rect x="280" y="308" width="28" height="28" fill="#7c3aed"/>
    <rect x="308" y="308" width="28" height="28" fill="#5b21b6"/>

    <rect x="224" y="280" width="28" height="28" fill="#5b21b6"/>
    <rect x="252" y="280" width="28" height="28" fill="#6d28d9"/>
    <rect x="280" y="280" width="28" height="28" fill="#6d28d9"/>
    <rect x="308" y="280" width="28" height="28" fill="#5b21b6"/>

    <rect x="224" y="252" width="28" height="28" fill="#4c1d95"/>
    <rect x="252" y="252" width="28" height="28" fill="#6d28d9"/>
    <rect x="280" y="252" width="28" height="28" fill="#6d28d9"/>
    <rect x="308" y="252" width="28" height="28" fill="#4c1d95"/>

    <rect x="224" y="224" width="28" height="28" fill="#4c1d95"/>
    <rect x="252" y="224" width="28" height="28" fill="#5b21b6"/>
    <rect x="280" y="224" width="28" height="28" fill="#5b21b6"/>
    <rect x="308" y="224" width="28" height="28" fill="#4c1d95"/>

    <!-- Pen top (eraser / cap) -->
    <rect x="224" y="196" width="28" height="28" fill="#f472b6"/>
    <rect x="252" y="196" width="28" height="28" fill="#f9a8d4"/>
    <rect x="280" y="196" width="28" height="28" fill="#f9a8d4"/>
    <rect x="308" y="196" width="28" height="28" fill="#f472b6"/>

    <rect x="252" y="168" width="28" height="28" fill="#f472b6"/>
    <rect x="280" y="168" width="28" height="28" fill="#f472b6"/>
  </g>

  <!-- ==================== PIXELATED LIGHTBULB (right-top) ==================== -->
  <g transform="translate(530, 120)">
    <!-- Bulb glass - top dome -->
    <rect x="140" y="0" width="32" height="32" fill="#fde68a"/>
    <rect x="172" y="0" width="32" height="32" fill="#fde68a"/>

    <rect x="108" y="32" width="32" height="32" fill="#fde68a"/>
    <rect x="140" y="32" width="32" height="32" fill="#fef9c3"/>
    <rect x="172" y="32" width="32" height="32" fill="#fef9c3"/>
    <rect x="204" y="32" width="32" height="32" fill="#fde68a"/>

    <rect x="76" y="64" width="32" height="32" fill="#fcd34d"/>
    <rect x="108" y="64" width="32" height="32" fill="#fde68a"/>
    <rect x="140" y="64" width="32" height="32" fill="#fef9c3"/>
    <rect x="172" y="64" width="32" height="32" fill="#fef9c3"/>
    <rect x="204" y="64" width="32" height="32" fill="#fde68a"/>
    <rect x="236" y="64" width="32" height="32" fill="#fcd34d"/>

    <rect x="76" y="96" width="32" height="32" fill="#fbbf24"/>
    <rect x="108" y="96" width="32" height="32" fill="#fde68a"/>
    <rect x="140" y="96" width="32" height="32" fill="#fef9c3"/>
    <rect x="172" y="96" width="32" height="32" fill="#fef9c3"/>
    <rect x="204" y="96" width="32" height="32" fill="#fde68a"/>
    <rect x="236" y="96" width="32" height="32" fill="#fbbf24"/>

    <rect x="76" y="128" width="32" height="32" fill="#f59e0b"/>
    <rect x="108" y="128" width="32" height="32" fill="#fbbf24"/>
    <rect x="140" y="128" width="32" height="32" fill="#fde68a"/>
    <rect x="172" y="128" width="32" height="32" fill="#fde68a"/>
    <rect x="204" y="128" width="32" height="32" fill="#fbbf24"/>
    <rect x="236" y="128" width="32" height="32" fill="#f59e0b"/>

    <rect x="76" y="160" width="32" height="32" fill="#f59e0b"/>
    <rect x="108" y="160" width="32" height="32" fill="#fbbf24"/>
    <rect x="140" y="160" width="32" height="32" fill="#fcd34d"/>
    <rect x="172" y="160" width="32" height="32" fill="#fcd34d"/>
    <rect x="204" y="160" width="32" height="32" fill="#fbbf24"/>
    <rect x="236" y="160" width="32" height="32" fill="#f59e0b"/>

    <!-- Narrowing toward base -->
    <rect x="108" y="192" width="32" height="32" fill="#d97706"/>
    <rect x="140" y="192" width="32" height="32" fill="#f59e0b"/>
    <rect x="172" y="192" width="32" height="32" fill="#f59e0b"/>
    <rect x="204" y="192" width="32" height="32" fill="#d97706"/>

    <!-- Screw base (metallic gray) -->
    <rect x="108" y="224" width="32" height="32" fill="#9ca3af"/>
    <rect x="140" y="224" width="32" height="32" fill="#d1d5db"/>
    <rect x="172" y="224" width="32" height="32" fill="#d1d5db"/>
    <rect x="204" y="224" width="32" height="32" fill="#9ca3af"/>

    <rect x="120" y="256" width="32" height="32" fill="#6b7280"/>
    <rect x="152" y="256" width="32" height="32" fill="#9ca3af"/>
    <rect x="184" y="256" width="32" height="32" fill="#6b7280"/>

    <rect x="140" y="288" width="32" height="28" fill="#4b5563"/>
    <rect x="172" y="288" width="32" height="28" fill="#4b5563"/>

    <!-- Light rays (small pixel sparkles) -->
    <rect x="44" y="80" width="20" height="20" fill="#fde68a" opacity="0.7"/>
    <rect x="280" y="80" width="20" height="20" fill="#fde68a" opacity="0.7"/>
    <rect x="24" y="140" width="20" height="20" fill="#fcd34d" opacity="0.5"/>
    <rect x="300" y="140" width="20" height="20" fill="#fcd34d" opacity="0.5"/>
    <rect x="156" y="-36" width="20" height="20" fill="#fde68a" opacity="0.6"/>
    <rect x="80" y="-16" width="16" height="16" fill="#fcd34d" opacity="0.4"/>
    <rect x="248" y="-16" width="16" height="16" fill="#fcd34d" opacity="0.4"/>
  </g>

  <!-- Small pixel sparkles scattered -->
  <rect x="520" y="108" width="12" height="12" fill="#fef9c3" opacity="0.5"/>
  <rect x="880" y="180" width="12" height="12" fill="#fef9c3" opacity="0.4"/>
  <rect x="780" y="108" width="10" height="10" fill="#fde68a" opacity="0.35"/>

  <!-- Pixel ink dots near pen tip -->
  <rect x="208" y="680" width="16" height="16" fill="#c4b5fd" opacity="0.6"/>
  <rect x="240" y="710" width="12" height="12" fill="#a78bfa" opacity="0.4"/>
  <rect x="180" y="720" width="10" height="10" fill="#8b5cf6" opacity="0.3"/>
</svg>
